name: Full CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healenium-test:
    name: Healenium Self-Healing CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Healenium Backend (Docker)
        run: |
          cd healenium-2.1.10
          docker compose up -d
          # Wait for Postgres and Backend to be healthy
          sleep 30 

      - name: Run Selenium Tests
        # Adding 'continue-on-error' so the report generates even if tests fail
        continue-on-error: true 
        run: mvn clean test

      - name: Generate Healenium Report
        # This triggers the plugin we added to the pom.xml
        run: mvn com.epam.healenium:hlm-report-mvn:1.1:initReport com.epam.healenium:hlm-report-mvn:1.1:buildReport

      - name: Verify Reports Exist
        run: |
          echo "Checking for report files..."
          find . -name "ExtentReport.html" -o -name "index.html" 2>/dev/null | head -20
          ls -la target/surefire-reports/ 2>/dev/null || echo "No surefire reports"
          ls -la reports/ 2>/dev/null || echo "No reports folder"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-reports
          path: |
            target/surefire-reports/
            reports/
            test-screenshots/
          if-no-files-found: warn
          retention-days: 30

      - name: Zip Healenium Report
        if: always()
        run: |
          # Zipping the complex Healenium folder
          zip -r healenium-report.zip reports/healenium

      - name: Send Combined QA Report Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_SALLYSEDKY }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          subject: "QA Automation Summary: ${{ github.repository }} - Build #${{ github.run_number }}"
          to: sallysedkey.fci87@gmail.com
          from: "Automation Suite"
          body: |
            Hello,
            
            The latest execution for project '${{ github.repository }}' is complete.
            
            Summary of Attachments:
            1. healenium-report.zip: AI Self-Healing details (Download and extract to view).
            2. ExtentReport.html: Standard TestNG Pass/Fail summary.
            
            Final Job Status: ${{ job.status }}
            View full details here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          # We attach the ZIP and the single HTML file separately
          attachments: healenium-report.zip,reports/ExtentReport.html

  standard-test:
    name: Standard Cross-Browser CI
    needs: healenium-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Run tests
        env:
          CI: "true"
          BROWSER: ${{ matrix.browser }}
        run: |
          mkdir -p reports test-screenshots
          mvn -B test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}
          path: reports/ExtentReport.html
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-screenshots/**/*.png
          if-no-files-found: ignore