name: Full CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healenium-test:
    name: Healenium Self-Healing CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Healenium Backend (Docker)
        run: |
          cd healenium-2.1.10
          docker compose up -d
          sleep 30 

      - name: Run Selenium Tests
        continue-on-error: true 
        run: mvn clean test

      - name: Generate Healenium Report
        continue-on-error: true
        run: mvn com.epam.healenium:hlm-report-mvn:1.1:initReport com.epam.healenium:hlm-report-mvn:1.1:buildReport

      - name: List Generated Files
        if: always()
        run: |
          echo "=== Looking for all reports ==="
          find . -type f \( -name "*.html" -o -name "index.html" \) 2>/dev/null | head -20
          echo ""
          echo "=== Checking target/surefire-reports ==="
          ls -lah target/surefire-reports/ 2>/dev/null || echo "Not found"
          echo ""
          echo "=== Checking reports directory ==="
          ls -lah reports/ 2>/dev/null || echo "Not found"

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_id }}
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Healenium Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healenium-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 📊 Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Artifacts:" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "target/surefire-reports" ] && [ "$(ls -A target/surefire-reports)" ]; then
            echo "✅ **Surefire Test Reports** - XML format" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -d "reports" ] && [ "$(ls -A reports)" ]; then
            echo "✅ **Healenium Reports** - Generated" >> $GITHUB_STEP_SUMMARY
            find reports -type f -name "*.html" -o -name "*.xml" | sed 's/^/  - /' >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [Download from Actions Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Send Summary Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_SALLYSEDKY }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Test Execution Report - ${{ job.status }}"
          to: sallysedkey.fci87@gmail.com
          from: GitHub Actions
          body: |
            📋 Test Execution Summary
            ========================
            
            Status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            
            🔗 View Full Report & Artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            📦 All test reports and artifacts are available in GitHub Actions.
            Download them from the Artifacts section in the workflow run above.
            
            ✨ Test reports generated:
            - Surefire XML Reports (target/surefire-reports/)
            - Healenium Reports (reports/)

  standard-test:
    name: Standard Cross-Browser CI
    needs: healenium-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Run tests
        env:
          CI: "true"
          BROWSER: ${{ matrix.browser }}
        run: |
          mkdir -p reports test-screenshots
          mvn -B test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}
          path: target/surefire-reports

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}
          path: reports/ExtentReport.html
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-screenshots/**/*.png
          if-no-files-found: ignore