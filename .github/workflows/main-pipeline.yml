name: Full CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  healenium-test:
    name: Healenium Self-Healing CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Healenium Backend (Docker)
        run: |
          cd healenium-2.1.10
          docker compose up -d
          sleep 30 

      - name: Run Selenium Tests
        run: mvn clean test -DsuiteXmlFile=testng.xml

      - name: Generate Healenium Report
        if: always()
        run: |
            mvn hlm-report-mvn:buildReport \
            -Dhlm.server.url=http://localhost:7878 \
            -Dhlm.enabled=true

      - name: 🔍 Debug - List ALL directories and files
        if: always()
        run: |
          echo "==================== ENTIRE WORKSPACE ===================="
          find . -type d -name "target" -o -type d -name "reports" -o -type d -name "test-output" 2>/dev/null | head -20
          echo ""
          echo "==================== TARGET DIRECTORY ===================="
          ls -lah target/ 2>/dev/null || echo "❌ target/ does NOT exist"
          echo ""
          echo "==================== REPORTS DIRECTORY ===================="
          ls -lah reports/ 2>/dev/null || echo "❌ reports/ does NOT exist"
          echo ""
          echo "==================== TEST-OUTPUT DIRECTORY ===================="
          ls -lah test-output/ 2>/dev/null || echo "❌ test-output/ does NOT exist"
          echo ""
          echo "==================== ALL HTML FILES ===================="
          find . -type f -name "*.html" 2>/dev/null
          echo ""
          echo "==================== ALL XML REPORT FILES ===================="
          find . -type f -name "*.xml" | grep -i report 2>/dev/null || echo "❌ No XML reports found"

      - name: 🔍 Debug - Check Maven Build Success
        if: always()
        run: |
          if [ -d "target/surefire-reports" ]; then
            echo "✅ Surefire reports directory EXISTS"
            ls -lah target/surefire-reports/
          else
            echo "❌ Surefire reports directory MISSING"
          fi

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 🔍 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "🟢 **Status: PASSED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" == "cancelled" ]; then
            echo "⚪ **Status: CANCELLED/SKIPPED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔴 **Status: FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "target/surefire-reports" ] && [ -n "$(find target/surefire-reports -type f)" ]; then
            echo "✅ **Surefire Reports Found**" >> $GITHUB_STEP_SUMMARY
            find target/surefire-reports -type f | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **No Surefire Reports Generated**" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -d "target/hlm-report" ] && [ -n "$(find target/hlm-report -type f)" ]; then
            echo "✅ **Healenium Reports Found**" >> $GITHUB_STEP_SUMMARY
            find target/hlm-report -type f | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **No Healenium Reports Generated**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Surefire Reports (if they exist)
        if: always() && hashFiles('target/surefire-reports/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload Healenium Reports (if they exist)
        if: always() && hashFiles('target/hlm-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: healenium-reports-${{ github.run_id }}
          path: target/hlm-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./target/hlm-report # Deploy the Healenium HTML folder
            destination_dir: reports/${{ github.run_number }} # Save each run in a new folder

      - name: Zip Healenium Report
        if: always()
        run: |
          # Zipping the complex Healenium folder
          zip -r healenium-report.zip target/hlm-report

      - name: Send Combined QA Report Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_SALLYSEDKY }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "QA Automation Summary: ${{ github.repository }} - Build #${{ github.run_number }} [${{ job.status == 'success' && '🟢 PASSED' || job.status == 'cancelled' && '⚪ SKIPPED' || '🔴 FAILED' }}]"
          to: sallysedkey.fci87@gmail.com
          from: "Automation Suite"
          body: |
            Hello,
            
            The latest execution for project '${{ github.repository }}' is complete.
            
            Status: ${{ job.status == 'success' && '🟢 PASSED' || job.status == 'cancelled' && '⚪ SKIPPED' || '🔴 FAILED' }}
            
            Summary of Attachments:
            1. healenium-report.zip: AI Self-Healing details (Download and extract to view).
            2. emailable-report.html: Standard TestNG Pass/Fail summary.
            
            View full details here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          # We attach the ZIP and the single HTML file separately
          attachments: |
            healenium-report.zip,
            target/surefire-reports/emailable-report.html

  standard-test:
    name: Standard Cross-Browser CI
    needs: healenium-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Run tests
        env:
          CI: "true"
          BROWSER: ${{ matrix.browser }}
        run: |
          mkdir -p reports test-screenshots
          mvn -B clean test -DsuiteXmlFile=testng.xml

      - name: Upload Surefire reports
        if: always() && hashFiles('target/surefire-reports/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.browser }}-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload Extent report
        if: always() && hashFiles('reports/ExtentReport.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}-${{ github.run_id }}
          path: reports/ExtentReport.html
          retention-days: 30

      - name: Upload screenshots
        if: always() && hashFiles('test-screenshots/**/*.png') != ''
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}-${{ github.run_id }}
          path: test-screenshots/
          retention-days: 30