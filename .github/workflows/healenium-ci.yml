name: Healenium Self-Healing CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Healenium Backend (Docker)
        run: |
          cd healenium-2.1.10
          docker compose up -d
          # Wait for Postgres and Backend to be healthy
          sleep 30 

      - name: Run Selenium Tests (Headless)
        run: mvn clean test -Dheadless=true
        # Ensure your code reads the -Dheadless flag to set ChromeOptions

      - name: Upload Healenium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healenium-report
          path: |
            target/site/
            # If your report is inside the docker container, 
            # you might need to 'docker cp' it out first.
