name: Healenium Self-Healing CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Healenium Backend (Docker)
        run: |
          cd healenium-2.1.10
          docker compose up -d
          # Wait for Postgres and Backend to be healthy
          sleep 30 

      - name: Run Selenium Tests
        # Adding 'continue-on-error' so the report generates even if tests fail
        continue-on-error: true 
        run: mvn clean test

      - name: Generate Healenium Report
        # This triggers the plugin we added to the pom.xml
        run: mvn com.epam.healenium:hlm-report-mvn:1.1:initReport com.epam.healenium:hlm-report-mvn:1.1:buildReport

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-reports
          path: |
            target/surefire-reports/
            reports/
            test-screenshots/
          if-no-files-found: warn

      - name: Zip Healenium Report
        if: always()
        run: |
          # Zipping the complex Healenium folder
          zip -r healenium-report.zip reports/healenium

      - name: Send Combined QA Report Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_SALLYSEDKY }}
          password: ${{ secrets.MAIL_PASSWORD }}
          
          subject: "QA Automation Summary: ${{ github.repository }} - Build #${{ github.run_number }}"
          to: sallysedkey.fci87@gmail.com
          from: "Automation Suite"
          body: |
            Hello,
            
            The latest execution for project '${{ github.repository }}' is complete.
            
            Summary of Attachments:
            1. healenium-report.zip: AI Self-Healing details (Download and extract to view).
            2. ExtentReport.html: Standard TestNG Pass/Fail summary.
            
            Final Job Status: ${{ job.status }}
            View full details here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          # We attach the ZIP and the single HTML file separately
          attachments: healenium-report.zip,reports/ExtentReport.html
